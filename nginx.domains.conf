# ─────────────────────────────────────────────────────────────────────────────
# Creado y diseñado por XO
# XLayout — Nginx Multi-Domain Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Sirve 3 dominios desde una sola instancia:
#   xlayout.mx         → web_prod (site/landing/admin)
#   xlayout.studio     → web_prod (studio/editor)
#   api.xlayout.mx     → api_prod (API backend)
#
# Nota: Ambos dominios web apuntan al mismo upstream (Next.js).
# El middleware de Next.js reescribe las rutas según el Host header.
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Uploads grandes (modelos 3D)
    client_max_body_size 150m;

    # GLB / GLTF MIME types
    types {
        model/gltf-binary   glb;
        model/gltf+json     gltf;
        application/octet-stream  fbx obj dae 3ds;
    }

    # Resolver DNS interno de Docker
    resolver 127.0.0.11 valid=30s;

    # ─── Upstreams ─────────────────────────────────────────────────────────────
    upstream web_backend {
        server web_prod:3020;
    }

    upstream api_backend {
        server api_prod:3020;
    }

    # ─── API (api.xlayout.mx) ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.xlayout.mx;

        # CORS headers para API
        # (El backend NestJS maneja CORS a nivel aplicación,
        #  pero nginx agrega headers para archivos estáticos)

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            client_max_body_size 150m;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
    }

    # ─── xlayout.mx (sitio institucional + admin) ──────────────────────────────
    server {
        listen 80;
        server_name xlayout.mx www.xlayout.mx;

        # Assets estáticos
        location /storage/ {
            alias /opt/xlayout/storage/;
            try_files $uri $uri/ =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000";
        }

        location /storage/converted/ {
            alias /opt/xlayout/storage/converted/;
            try_files $uri =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000, immutable";
            gzip off;
            etag on;
            add_header Accept-Ranges bytes;
        }

        # API proxy (para requests desde el mismo dominio via /api)
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            client_max_body_size 150m;
            proxy_read_timeout 300s;
        }

        # Frontend
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ─── xlayout.studio (editor/workspace) ─────────────────────────────────────
    server {
        listen 80;
        server_name xlayout.studio www.xlayout.studio;

        # Assets estáticos (compartidos)
        location /storage/ {
            alias /opt/xlayout/storage/;
            try_files $uri $uri/ =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000";
        }

        location /storage/converted/ {
            alias /opt/xlayout/storage/converted/;
            try_files $uri =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000, immutable";
            gzip off;
            etag on;
            add_header Accept-Ranges bytes;
        }

        # API proxy
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            client_max_body_size 150m;
            proxy_read_timeout 300s;
        }

        # Frontend (mismo upstream, distinto Host → middleware routea a /studio/*)
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ─── Fallback por IP directa (legacy / transición) ─────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        location /storage/ {
            alias /opt/xlayout/storage/;
            try_files $uri $uri/ =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000";
        }

        location /storage/converted/ {
            alias /opt/xlayout/storage/converted/;
            try_files $uri =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000, immutable";
            gzip off;
            etag on;
        }

        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            client_max_body_size 150m;
            proxy_read_timeout 300s;
        }

        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
