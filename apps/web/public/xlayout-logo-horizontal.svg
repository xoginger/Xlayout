<!-- Creado y diseñado por XO -->
<!-- XLayout Logo Horizontal — Logo completo para header, login, splash, branding principal -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <!-- === ICONO X (centrado vertical en 200px) === -->
  <g transform="translate(30, 15) scale(0.66)">
    <!-- Brazo superior-izquierdo (cyan claro) -->
    <path d="M28 36 L84 36 L140 128 L112 172" fill="#00D4FF"/>
    <!-- Brazo inferior-izquierdo (cyan medio) -->
    <path d="M112 84 L140 128 L84 220 L28 220" fill="#00BFFF"/>
    <!-- Brazo superior-derecho (navy oscuro) -->
    <path d="M228 36 L172 36 L116 128 L144 172" fill="#1E3A8A"/>
    <!-- Brazo inferior-derecho (azul medio) -->
    <path d="M144 84 L116 128 L172 220 L228 220" fill="#2563EB"/>
    <!-- Nodo central — diamante -->
    <rect x="108" y="108" width="40" height="40" rx="4" transform="rotate(45 128 128)" fill="#1D4ED8"/>
  </g>

  <!-- === TEXTO XLAYOUT === -->
  <text x="220" y="118" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="900" letter-spacing="12" fill="white">
    XLAYOUT
  </text>
</svg>
