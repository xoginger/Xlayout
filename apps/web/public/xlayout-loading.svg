<!-- Creado y diseñado por XO -->
<!-- XLayout Loading — Animación de carga con la X de marca -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <style>
    @keyframes pulseGlow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes spinDiamond {
      0% { transform: rotate(45deg); }
      100% { transform: rotate(405deg); }
    }
    .arm-tl { animation: pulseGlow 1.6s ease-in-out infinite 0s; }
    .arm-bl { animation: pulseGlow 1.6s ease-in-out infinite 0.2s; }
    .arm-tr { animation: pulseGlow 1.6s ease-in-out infinite 0.4s; }
    .arm-br { animation: pulseGlow 1.6s ease-in-out infinite 0.6s; }
    .diamond {
      transform-origin: 128px 128px;
      animation: spinDiamond 2s linear infinite;
    }
  </style>

  <!-- Brazo superior-izquierdo (cyan claro) -->
  <path class="arm-tl" d="M28 36 L84 36 L140 128 L112 172" fill="#00D4FF"/>
  <!-- Brazo inferior-izquierdo (cyan medio) -->
  <path class="arm-bl" d="M112 84 L140 128 L84 220 L28 220" fill="#00BFFF"/>
  <!-- Brazo superior-derecho (navy oscuro) -->
  <path class="arm-tr" d="M228 36 L172 36 L116 128 L144 172" fill="#1E3A8A"/>
  <!-- Brazo inferior-derecho (azul medio) -->
  <path class="arm-br" d="M144 84 L116 128 L172 220 L228 220" fill="#2563EB"/>
  <!-- Nodo central — diamante giratorio -->
  <rect class="diamond" x="108" y="108" width="40" height="40" rx="4" fill="#1D4ED8"/>
</svg>
