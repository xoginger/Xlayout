# ─────────────────────────────────────────────────────────────────────────────
# Creado y diseñado por XO
# XLayout — Nginx Producción con SSL/HTTPS
# ─────────────────────────────────────────────────────────────────────────────
# Dominios:
#   xlayout.mx         → web_prod (institucional / admin)
#   xlayout.studio     → web_prod (editor / workspace)
#   api.xlayout.mx     → api_prod (API backend)
#
# Certificados: Let's Encrypt via Certbot (auto-renovación)
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 2048;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ─── Tamaño máximo de upload (modelos 3D) ──────────────────────────────
    client_max_body_size 150m;

    # ─── MIME types adicionales para assets 3D ─────────────────────────────
    types {
        model/gltf-binary   glb;
        model/gltf+json     gltf;
        application/octet-stream  fbx obj dae 3ds;
    }

    # ─── Compresión gzip ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        model/gltf+json;

    # ─── Resolver DNS interno Docker ───────────────────────────────────────
    resolver 127.0.0.11 valid=30s;

    # ─── Upstreams ─────────────────────────────────────────────────────────
    upstream web_backend {
        server web_prod:3000;
    }

    upstream api_backend {
        server api_prod:3000;
    }

    # ─── Parámetros SSL compartidos ────────────────────────────────────────
    # Se incluyen en cada server HTTPS para evitar duplicación
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ═══════════════════════════════════════════════════════════════════════
    # HTTP → HTTPS (redirect global)
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;

        # Certbot challenge (renovación automática)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect todo lo demás a HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════
    # api.xlayout.mx (HTTPS — Backend API)
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name api.xlayout.mx;

        ssl_certificate     /etc/letsencrypt/live/api.xlayout.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.xlayout.mx/privkey.pem;

        # Headers de seguridad
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            client_max_body_size 150m;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════
    # xlayout.mx (HTTPS — Sitio institucional + Admin)
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name xlayout.mx www.xlayout.mx;

        ssl_certificate     /etc/letsencrypt/live/xlayout.mx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xlayout.mx/privkey.pem;

        # Headers de seguridad
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Assets estáticos (storage compartido)
        location /storage/ {
            alias /opt/xlayout/storage/;
            try_files $uri $uri/ =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000";
        }

        # Assets 3D convertidos (con headers especiales para modelos)
        location /storage/converted/ {
            alias /opt/xlayout/storage/converted/;
            try_files $uri =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000, immutable";
            gzip off;
            etag on;
            add_header Accept-Ranges bytes;
        }

        # Proxy a API (requests del frontend via /api)
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            client_max_body_size 150m;
            proxy_read_timeout 300s;
        }

        # Frontend (Next.js)
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════
    # xlayout.studio (HTTPS — Editor / Workspace)
    # ═══════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name xlayout.studio www.xlayout.studio;

        ssl_certificate     /etc/letsencrypt/live/xlayout.studio/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xlayout.studio/privkey.pem;

        # Headers de seguridad
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Assets estáticos (mismo storage compartido)
        location /storage/ {
            alias /opt/xlayout/storage/;
            try_files $uri $uri/ =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000";
        }

        location /storage/converted/ {
            alias /opt/xlayout/storage/converted/;
            try_files $uri =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000, immutable";
            gzip off;
            etag on;
            add_header Accept-Ranges bytes;
        }

        # Proxy a API
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            client_max_body_size 150m;
            proxy_read_timeout 300s;
        }

        # Frontend (mismo upstream, middleware diferencia por Host header)
        location / {
            proxy_pass http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
