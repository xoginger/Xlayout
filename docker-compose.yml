version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: xlayout_postgres
    environment:
      POSTGRES_USER: xlayout_user
      POSTGRES_PASSWORD: xlayout_password
      POSTGRES_DB: xlayout_db
    ports:
      - "5432:5432"
    volumes:
      - xlayout_pgdata:/var/lib/postgresql/data
    networks:
      - xlayout_net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xlayout_user -d xlayout_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: xlayout_redis
    ports:
      - "6379:6379"
    networks:
      - xlayout_net
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: xlayout_api
    environment:
      - DATABASE_URL=postgresql://xlayout_user:xlayout_password@postgres:5432/xlayout_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super_secret_jwt_key
      - PORT=3000
      - PRISMA_QUERY_ENGINE_TYPE=binary
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xlayout_net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: xlayout_worker
    command: npm run start:worker
    environment:
      - DATABASE_URL=postgresql://xlayout_user:xlayout_password@postgres:5432/xlayout_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PRISMA_QUERY_ENGINE_TYPE=binary
      - PRISMA_CLI_QUERY_ENGINE_TYPE=binary
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xlayout_net
    restart: always

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: xlayout_web
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      api:
        condition: service_healthy
    networks:
      - xlayout_net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: xlayout_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/xlayout/storage:/opt/xlayout/storage:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - xlayout_net
    restart: always

networks:
  xlayout_net:
    driver: bridge

volumes:
  xlayout_pgdata:

