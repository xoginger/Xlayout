events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Allow large 3D model uploads
    client_max_body_size 150m;

    # GLB / GLTF MIME types
    types {
        model/gltf-binary   glb;
        model/gltf+json     gltf;
        application/octet-stream  fbx obj dae 3ds;
    }

    # Resolver para Docker
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name _;

        # Static assets — uploaded originals and converted GLBs
        location /storage/ {
            alias /opt/xlayout/storage/;
            try_files $uri $uri/ =404;
            add_header Access-Control-Allow-Origin *;
            add_header Cache-Control "public, max-age=31536000";
        }

        # API routing
        location /api/ {
            set $upstream_api http://api:3000;
            proxy_pass $upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            # Allow large uploads to pass through
            client_max_body_size 150m;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Frontend routing
        location / {
            set $upstream_web http://web:3000;
            proxy_pass $upstream_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
