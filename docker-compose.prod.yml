# Creado y diseñado por XO
# ─────────────────────────────────────────────────────────────────────────────
# XLayout — Docker Compose de PRODUCCIÓN
# ─────────────────────────────────────────────────────────────────────────────
# Este archivo define la infraestructura COMPLETA de producción.
# Es independiente del compose de desarrollo (docker-compose.yml).
# Todos los servicios, volúmenes y redes son propios de producción.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── Base de datos de producción ─────────────────────────────────────────
  postgres_prod:
    image: postgres:15-alpine
    container_name: xlayout_postgres_prod
    environment:
      POSTGRES_USER: xlayout_prod_user
      POSTGRES_PASSWORD: Xl4y0ut_Pr0d_2026!
      POSTGRES_DB: xlayout_prod_db
    volumes:
      - xlayout_pgdata_prod:/var/lib/postgresql/data
    networks:
      - xlayout_net_prod
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xlayout_prod_user -d xlayout_prod_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Redis de producción ─────────────────────────────────────────────────
  redis_prod:
    image: redis:7-alpine
    container_name: xlayout_redis_prod
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env.production
    volumes:
      - xlayout_redis_data_prod:/data
    networks:
      - xlayout_net_prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ─── API de producción ───────────────────────────────────────────────────
  api_prod:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: xlayout_api_prod
    env_file:
      - .env.production
    environment:
      # Conexiones a servicios propios de producción
      DATABASE_URL: postgresql://xlayout_prod_user:Xl4y0ut_Pr0d_2026!@postgres_prod:5432/xlayout_prod_db?schema=public
      REDIS_HOST: redis_prod
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PORT: 3000
      UPLOAD_DIR: /app/storage
      PUBLIC_STORAGE_URL: /storage
    depends_on:
      postgres_prod:
        condition: service_healthy
      redis_prod:
        condition: service_healthy
    volumes:
      - xlayout_storage_prod:/app/storage
    networks:
      - xlayout_net_prod
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Worker de producción (BullMQ jobs) ──────────────────────────────────
  worker_prod:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: xlayout_worker_prod
    command: npm run start:worker
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://xlayout_prod_user:Xl4y0ut_Pr0d_2026!@postgres_prod:5432/xlayout_prod_db?schema=public
      REDIS_HOST: redis_prod
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      UPLOAD_DIR: /app/storage
      PUBLIC_STORAGE_URL: /storage
    depends_on:
      postgres_prod:
        condition: service_healthy
      redis_prod:
        condition: service_healthy
    volumes:
      - xlayout_storage_prod:/app/storage
    networks:
      - xlayout_net_prod
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const Redis = require('ioredis'); const r = new Redis({host:'redis_prod',port:6379,password:process.env.REDIS_PASSWORD,connectTimeout:3000}); r.ping().then(()=>{r.disconnect();process.exit(0)}).catch(()=>{r.disconnect();process.exit(1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Frontend de producción ──────────────────────────────────────────────
  web_prod:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_SITE_DOMAIN: xlayout.mx
        NEXT_PUBLIC_STUDIO_DOMAIN: xlayout.studio
        NEXT_PUBLIC_AUTH_DOMAIN: https://xlayout.mx
    container_name: xlayout_web_prod
    env_file:
      - .env.production
    networks:
      - xlayout_net_prod
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Nginx reverse proxy (SSL + static) ─────────────────────────────────
  nginx_prod:
    image: nginx:alpine
    container_name: xlayout_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - xlayout_storage_prod:/opt/xlayout/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      api_prod:
        condition: service_healthy
      web_prod:
        condition: service_healthy
    networks:
      - xlayout_net_prod
    restart: always

# ─── Redes ─────────────────────────────────────────────────────────────────
networks:
  xlayout_net_prod:
    driver: bridge

# ─── Volúmenes ─────────────────────────────────────────────────────────────
volumes:
  xlayout_pgdata_prod:
    name: xlayout_pgdata_prod
  xlayout_redis_data_prod:
    name: xlayout_redis_data_prod
  xlayout_storage_prod:
    name: xlayout_storage_prod
